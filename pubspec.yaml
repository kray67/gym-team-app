name: gym_team
description: "A personal workout tracking app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # UI / Utilities
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

  # Icon + splash generation
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env

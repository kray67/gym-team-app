<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- Background -->
  <rect width="1024" height="1024" fill="#1C1B2E"/>

  <!--
    Dumbbell centered at (512, 430)
    Total width: 600px (x: 212–812)
    Weights: 90×200px  |  Collars: 24×150px  |  Bar: 372×28px
  -->

  <!-- Left weight plate -->
  <rect x="212" y="330" width="90" height="200" rx="16" fill="#A09BFF"/>
  <!-- Left collar -->
  <rect x="302" y="355" width="26" height="150" rx="7" fill="#8B86F0"/>
  <!-- Bar -->
  <rect x="328" y="416" width="368" height="28" rx="14" fill="#7B75FF"/>
  <!-- Right collar -->
  <rect x="696" y="355" width="26" height="150" rx="7" fill="#8B86F0"/>
  <!-- Right weight plate -->
  <rect x="722" y="330" width="90" height="200" rx="16" fill="#A09BFF"/>

  <!-- App name: "Gym" white + "Team" accent -->
  <text
    x="512" y="660"
    text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="-1"
    fill="#FFFFFF">Gym<tspan fill="#A09BFF">Team</tspan></text>

</svg>
